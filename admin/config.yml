backend:
  name: git-gateway
  branch: main

media_folder: "IMAGENES"
public_folder: "IMAGENES"

collections:
  - name: "computadoras"
    label: "Computadoras y Mini PCs"
    folder: "_datos/computadoras"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Título del Producto", name: "title", widget: "string"}
      - {label: "Precio", name: "precio", widget: "string"}
      - {label: "Imagen", name: "imagen", widget: "image"}
      - {label: "Descripción (Lista de características)", name: "body", widget: "markdown"}
      - {label: "Agotado", name: "agotado", widget: "boolean", default: false}

  - name: "proteccion"
    label: "Protección Eléctrica (UPS)"
    folder: "_datos/proteccion"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Título del Producto", name: "title", widget: "string"}
      - {label: "Precio", name: "precio", widget: "string"}
      - {label: "Imagen", name: "imagen", widget: "image"}
      - {label: "Descripción (Lista de características)", name: "body", widget: "markdown"}
      - {label: "Agotado", name: "agotado", widget: "boolean", default: false}